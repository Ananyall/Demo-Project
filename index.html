<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trendy Katta Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h2>WELCOME TO <span>TRENDY KATTA</span></h2>
      <p class="tagline">Because Every Gift Tells a Story...</p>

      	<form id="loginForm" class="login-form"> <div class="form-group">
      	<label for="email">Email</label>
      	<input type="email" id="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
      	<label for="password">Password</label>
      	<input type="password" id="password" placeholder="Enter your password" required />
      </div>

      <div class="button-group"> <button type="submit" class="login-button">Login</button>
      	<button type="button" class="login-button signin-button">Sign In</button> </div>

       <div class="forgot-password">
        	<a href="#">Forgot password?</a>
        </div>


  <script>
    // Simple JS for form submission
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      // Dummy validation
      if (email === "test@example.com" && password === "123456") {
        alert("Login successful!");
      } else {
        alert("Invalid email or password.");
      }
    });
  </script>
</body>
</html>
